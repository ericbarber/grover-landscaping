name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate expected project layout
        run: |
          test -f README.md
          test -d docs
          test -d backend
          test -d frontend
          test -d infra

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust checks when backend Cargo manifest exists
        run: |
          if [ -f backend/Cargo.toml ]; then
            cd backend
            cargo fmt --all -- --check
            cargo clippy --all-targets --all-features -- -D warnings
            cargo test --all
          else
            echo "backend/Cargo.toml not found; skipping Rust checks until backend is scaffolded."
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run frontend checks when package manifest exists
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run lint --if-present
            npm test --if-present
            npm run build --if-present
          else
            echo "frontend/package.json not found; skipping Node checks until frontend is scaffolded."
          fi
