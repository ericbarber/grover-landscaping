name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate expected project layout
        run: |
          test -f README.md
          test -d docs
          test -d backend
          test -d frontend
          test -d infra
          test -f Dockerfile
          test -f render.yaml

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grover_landscaping
          POSTGRES_USER: grover
          POSTGRES_PASSWORD: grover
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grover -d grover_landscaping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://grover:grover@localhost:5432/grover_landscaping
      RUST_LOG: grover_landscaping_api=debug,tower_http=debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply database migrations
        run: |
          for migration in backend/migrations/*.sql; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -f "$migration"
          done

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: backend

      - name: Run Rust lint checks
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: backend

      - name: Run Rust tests
        run: cargo test --all
        working-directory: backend

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  production-image:
    name: Production image
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production container
        run: docker build --tag grover-landscaping:ci .

  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate development Cognito infrastructure
        run: |
          terraform -chdir=infra/terraform/environments/dev init -backend=false
          terraform -chdir=infra/terraform/environments/dev validate

      - name: Validate production Cognito infrastructure
        run: |
          terraform -chdir=infra/terraform/environments/prod init -backend=false
          terraform -chdir=infra/terraform/environments/prod validate
